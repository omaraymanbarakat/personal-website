backend:
  name: github
  repo: omaraymanbarakat/personal-website
  branch: main
  base_url: https://personal-website-lac-nine-86.vercel.app
  auth_endpoint: api/auth

media_folder: public/images
public_folder: /images

collections:
  - name: settings
    label: Site Settings
    format: json
    files:
      - name: site
        label: Images & Global Settings
        file: src/data/settings.json
        fields:
          - { label: Homepage headshot, name: heroImage, widget: image }
          - { label: About page headshot, name: aboutImage, widget: image }

  - name: pages
    label: Pages
    files:
      - name: cover-letter
        label: Cover Letter
        file: src/content/pages/cover-letter.md
        format: frontmatter
        fields:
          - { label: Body, name: body, widget: markdown }

      - name: resume
        label: Résumé
        file: src/data/resume.json
        format: json
        fields:
          - { label: Summary, name: summary, widget: text }
          - name: experience
            label: Experience
            widget: list
            fields:
              - { label: Role, name: role, widget: string }
              - { label: Organisation, name: org, widget: string }
              - { label: Period, name: when, widget: string }
              - name: bullets
                label: Bullets
                widget: list
                field: { label: Bullet, name: bullet, widget: string }
          - { label: Earlier roles, name: earlier, widget: text }
          - name: certifications
            label: Certifications
            widget: list
            field: { label: Certification, name: item, widget: string }
          - name: awards
            label: Awards
            widget: list
            field: { label: Award, name: item, widget: string }
          - { label: Skills, name: skills, widget: text }
          - { label: Tools, name: tools, widget: text }
          - { label: Selected Products, name: selectedProducts, widget: text }
          - { label: Education — Degree, name: educationDegree, widget: string }
          - { label: Education — Institution, name: educationInstitution, widget: string }
          - { label: Languages, name: languages, widget: string }

  - name: work
    label: Case Studies
    folder: src/content/work
    create: true
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Order, name: order, widget: number }
      - label: Dimension
        name: dimension
        widget: select
        options:
          - Build
          - Fix
          - Design
          - Transform & Teach
      - { label: Company, name: company, widget: string }
      - { label: Company Context, name: companyContext, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Hook (card summary), name: hook, widget: string }
      - { label: Key Metric, name: metric, widget: string }
      - { label: Demonstrates, name: demonstrates, widget: string }
      - label: Sidebar Summary
        name: summary
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: Value, name: value, widget: text }
      - { label: Body, name: body, widget: markdown }
